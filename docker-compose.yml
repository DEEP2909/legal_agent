
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: legal_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio' && sleep 1; done;
      /usr/bin/mc mb -p local/legal-agent-dev || true;
      /usr/bin/mc anonymous set private local/legal-agent-dev || true;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
