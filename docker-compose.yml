
services:
  postgres:
    # pgvector 0.8.0 required for halfvec type (>2000 dimension vectors)
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: legal_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres   # override in production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legal_agent"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin   # override in production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy   # wait for MinIO health check to pass
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/legal-agent-dev || true;
      mc anonymous set private local/legal-agent-dev || true;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
